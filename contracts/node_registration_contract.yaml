contract:
  name: node_registration
  version: "1.0"
  description: Registration payload for constellation membership

fields:
  node_name:
    type: string
    required: true
  node_type:
    type: enum
    values: [engine, gateway, orchestrator, observer]
    required: true
  endpoint:
    type: url
    required: true
  actions:
    type: array
    items: string
    required: true
  schema_version:
    type: string
    required: true
  health_endpoint:
    type: url
    required: true
