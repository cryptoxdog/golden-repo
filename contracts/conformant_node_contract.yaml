contract:
  name: conformant_node
  version: "1.0"
  description: Requirements for an L9-conformant node

requirements:
  endpoints:
    - method: POST
      path: /v1/execute
      accepts: PacketEnvelope
      returns: PacketEnvelope
    - method: GET
      path: /v1/health
      returns:
        status: enum[healthy, degraded, unhealthy]
        version: string
        uptime_seconds: float
        probes: object

  protocol:
    - PacketEnvelope is the sole wire format
    - Idempotency enforced before handler invocation
    - Tenant isolation on all data operations
    - Lineage propagated on every hop
    - Content hash verified at ingress
    - Audit events emitted for state mutations

  startup:
    - Environment validated against .env.required
    - Database schema applied idempotently
    - Contract files present and parseable
    - Health probe returns healthy before accepting traffic
