version: "1.0"
schema_name: conformant_node_contract

ingress:
  endpoints:
    - path: /v1/execute
      method: POST
      accepts: PacketEnvelope
    - path: /v1/health
      method: GET
      returns: HealthPayload

handler_signature:
  pattern: "async def handle_{action}(tenant: str, payload: dict) -> dict"
  required_actions: [execute, describe]

guarantees:
  - PacketEnvelope constructed and validated before handler invocation
  - idempotency_key checked against packet_receipts before execution
  - tenant_id propagated through all downstream calls
  - lineage.generation incremented on every hop
  - content_hash verified at ingress
  - audit event emitted for every state mutation
