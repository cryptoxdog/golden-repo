# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: golden-repo
# layer: [contracts, governance]
# tags: [L9_TEMPLATE, governance, tenant]
# owner: platform
# status: active
# --- /L9_META ---

contract:
  id: l9.tenant_context
  title: Tenant Context — Multi-Tenancy Isolation Contract
  version: 1.0.0
  status: canonical

definition: >-
  TenantContext binds every TransportPacket to an organization, an actor, and a delegation chain.
  It is immutable across derivation and is the basis for all isolation, audit, and compliance.

fields:
  actor:
    type: string
    required: true
    semantics: who is performing the action right now
  on_behalf_of:
    type: string
    required: true
    semantics: who authorized this action
  originator:
    type: string
    required: true
    semantics: who started the chain (root of authority)
  org_id:
    type: string
    required: true
    semantics: tenant isolation key — every data store scopes by this
  user_id:
    type: string
    required: false
  principal_id:
    type: string
    required: false
    semantics: >-
      verified caller identity, materialised once at the chassis (after auth,
      before tenant binding) and propagated unchanged on every derived
      TransportPacket. Never serialised raw to log sinks; the structlog
      processor `chassis.logging.hash_principal_id_processor` replaces this
      field with `principal_id_hash` (SHA-256 hex) before emission.
    pii: hashed
    rollout:
      r0_r2: optional behind feature flag `tenant_ctx.principal_id`
      r3: required (see ADR-0003 and forthcoming ADR-0004 promotion)
    adr: docs/adr/0003-principal-id-on-tenant-context.md

invariants:
  - immutable_across_derivation
  - org_id_never_null
  - actor_never_null
  - cross_tenant_reads_forbidden
  - cross_tenant_writes_forbidden
  - principal_id_never_logged_raw

resolution_priority:
  - x_domain_key_header
  - x_tenant_key_header
  - subdomain
  - api_key_prefix
  - envelope_explicit_override

isolation_model:
  default: database_per_tenant
  alternatives:
    - labeled_partition
    - row_level_security
  rule: chosen_isolation_model_is_per_repo_decision_documented_in_adr

audit:
  every_packet_logs:
    - packet_id
    - org_id
    - actor
    - on_behalf_of
    - originator
    - action
    - timestamp
    - principal_id_hash
  retention: governed_by_packet_governance_retention_days
  pii_handling:
    principal_id:
      at_rest: hashed
      in_logs: hashed
      in_memory: raw_inside_request_scope_only
