version: "1.1"
schema_name: packet_envelope_v1

required_sections:
  identity:
    required_fields: [packet_id, packet_type, schema_version, idempotency_key, timestamp]
    invariants:
      - "packet_id is a v4 UUID, immutable after creation"
      - "schema_version is const 1.1"
      - "idempotency_key is unique per (tenant.org_id, source_node)"

  routing:
    required_fields: [source_node, destination_node, action]

  tenant:
    required_fields: [actor, on_behalf_of, originator, org_id]
    invariants:
      - "Tenant fields are immutable in all derived packets"

  payload:
    required_fields: [data]

  lineage:
    required_fields: [root_id, generation]
    invariants:
      - "root_id remains constant across derivation chain"
      - "generation increments by exactly 1 per hop"
      - "parent_id references the immediate ancestor packet_id"

  security:
    required_fields: [content_hash, envelope_hash]
    optional_fields: [signature, classification, encryption_status, pii_fields]
    invariants:
      - "content_hash is sha256 of canonical JSON of payload.data"
      - "envelope_hash is sha256 of canonical JSON of full envelope excluding security section"

  governance:
    optional_fields: [ttl_seconds, priority, retry_policy, dlq_target]

packet_types:
  - execute
  - response
  - error
  - health
  - audit
  - describe

replay_safety:
  idempotency_key_scope: [tenant.org_id, source_node]
  dedup_window_seconds: 86400
  storage: packet_receipts
