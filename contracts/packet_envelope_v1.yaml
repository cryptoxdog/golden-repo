contract:
  name: packet_envelope_v1
  version: "1.1"
  description: Canonical L9 PacketEnvelope wire format

fields:
  packet_id:
    type: uuid
    required: true
    immutable: true
  packet_type:
    type: enum
    values: [request, response, event, delegation]
    required: true
  schema_version:
    type: string
    required: true
    const: "1.1"
  timestamp:
    type: datetime
    required: true
    format: iso8601
    timezone: utc

addressing:
  source_node:
    type: string
    required: true
  target_node:
    type: string
    required: true

correlation:
  correlation_id:
    type: uuid
    required: true
  idempotency_key:
    type: string
    required: true

tenant:
  required: true
  fields:
    tenant_id:
      type: string
      required: true
    actor:
      type: string
      required: true
    on_behalf_of:
      type: string
      required: false
    originator:
      type: string
      required: true
    org_id:
      type: string
      required: true
  invariants:
    - Tenant fields are immutable in all derived packets

lineage:
  required: true
  fields:
    root_id:
      type: uuid
      required: true
    parent_id:
      type: uuid
      required: false
    generation:
      type: integer
      required: true
      minimum: 0
  invariants:
    - root_id remains constant across derivation
    - generation increments by 1 on each hop

payload:
  type: object
  required: true
  fields:
    action:
      type: string
      required: true
    data:
      type: object
      required: false

security:
  content_hash:
    type: sha256_hex
    required: true
  envelope_hash:
    type: sha256_hex
    required: false
  signature:
    type: string
    required: false
  classification:
    type: enum
    values: [public, internal, confidential, restricted]
    required: false
    default: internal

governance:
  required: true
  fields:
    retention_days:
      type: integer
      required: false
      default: 90
    audit_required:
      type: boolean
      required: false
      default: true

trace:
  type: array
  items:
    node:
      type: string
    timestamp:
      type: datetime
    action:
      type: string
    status:
      type: enum
      values: [received, processing, completed, failed]

lifecycle:
  ingress: validate -> enforce_contract -> check_idempotency -> route
  processing: inflate -> handle -> deflate -> audit
  egress: sign -> emit -> persist_receipt

invariants:
  - All inter-node communication MUST use PacketEnvelope
  - Raw dict/JSON between nodes is a protocol violation
  - content_hash MUST be verified before processing payload
  - idempotency_key MUST be checked before handler invocation
  - lineage.generation MUST increment on every hop
  - tenant fields are immutable across the entire packet lifecycle
