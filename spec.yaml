l9:
  version: "1.1"
  node:
    name: golden-repo
    type: engine
    runtime: python3.12
  ingress:
    endpoints:
      - method: POST
        path: /v1/execute
      - method: GET
        path: /v1/health
      - method: GET
        path: /v1/actions
    protocol:
      envelope: packet_envelope_v1
      idempotency: required
      tenant_isolation: required
      lineage: required
      signature: optional
  engine:
    spec_driven: true
    actions:
      - execute
      - describe
  health:
    states:
      - healthy
      - degraded
      - unhealthy
    probes:
      - database
      - contracts
