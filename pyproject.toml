[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "golden-repo-ai-review-system"
version = "1.1.0"
description = "Deterministic-first universal change governance engine for L9-aligned engine repositories"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Business Source License 1.1" }
authors = [
  { name = "OpenAI" }
]
dependencies = [
  "PyYAML>=6.0",
  "jsonschema>=4.22.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "ruff>=0.6.0",
  "mypy>=1.11.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
exclude = ["^\\.artifacts/"]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["engine*", "tools*"]
